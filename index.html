<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            width: 300px;
            height: 400px;
            background-color: yellow;
        }
        .card:hover{
            width: 300px;
            height: 400px;
            cursor: pointer;
            background-color: green;
        }
        img{
            width: 300px;
            height: 400px;
            cursor: pointer;
            transition: right 2s;
            background-color: yellow;
        }
        img:hover{
            width: 200px;
            height: 300px;
            cursor: pointer;
            background-color: green;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="./image.png" alt="image" style="width:100%;" height="80%;">
        <h1>card title</h1>

    </div>
</body>
</html>
